name: Build Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-release:
    permissions:
      contents: write
    name: Package extension and create release
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Verify manifest version
      shell: bash
      run: |
        node --check vaft/vaft.user.js
        node -e "JSON.parse(require('fs').readFileSync('rules/twitch-ads.json'))"
        node tests/vaft-smoke.cjs
        manifest_version=$(node -p "require('./manifest.json').version")
        tag_version="${GITHUB_REF_NAME#v}"
        test "$manifest_version" = "$tag_version"

    - name: Package extension
      shell: bash
      run: |
        package_dir="dist/Nigiriidesalmon-Twitch-VAFT-${GITHUB_REF_NAME}"
        mkdir -p "$package_dir/vaft" "$package_dir/rules"
        cp manifest.json LICENSE README.md README-LOCAL-EXTENSION.md "$package_dir/"
        cp vaft/vaft.user.js "$package_dir/vaft/"
        cp rules/twitch-ads.json "$package_dir/rules/"
        cd dist
        zip -r "Nigiriidesalmon-Twitch-VAFT-${GITHUB_REF_NAME}.zip" "Nigiriidesalmon-Twitch-VAFT-${GITHUB_REF_NAME}"

    - name: Create GitHub release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: bash
      run: |
        gh release create "$GITHUB_REF_NAME" \
          "dist/Nigiriidesalmon-Twitch-VAFT-${GITHUB_REF_NAME}.zip" \
          --title "Nigiriidesalmon Twitch VAFT ${GITHUB_REF_NAME}" \
          --generate-notes
